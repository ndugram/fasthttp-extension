name: Build & Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG not found — building."
          fi

      - name: Setup Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: npm ci

      - name: Compile TypeScript
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run compile

      - name: Package extension (.vsix)
        if: steps.tag_check.outputs.exists == 'false'
        run: npx @vscode/vsce package --no-dependencies -o fasthttp-extension-${{ steps.version.outputs.value }}.vsix

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body: |
            ## FastHTTP Extension v${{ steps.version.outputs.value }}

            ### Installation

            1. Download `fasthttp-extension-${{ steps.version.outputs.value }}.vsix` below
            2. Open VS Code → Command Palette (`Ctrl+Shift+P`)
            3. Run `Extensions: Install from VSIX...`
            4. Select the downloaded file
          files: fasthttp-extension-${{ steps.version.outputs.value }}.vsix
          draft: false
          prerelease: false
